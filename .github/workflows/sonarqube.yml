name: SonarQube Cloud Scan

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube-scan:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    steps:
      # 1. Download full repository history
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Flutter SDK
      - name: Set up Flutter
        uses: subosito/flutter-action@61282372a823930cd8227f16400fb2b0f495ca44 # v2.16.0
        with:
          # Line 18 starts here; ensure it aligns with previous steps
          flutter-version: stable

      # 3. Install Flutter dependencies
      - name: Install Flutter Dependencies
        run: flutter pub get

      # 4. Run the SonarQube Cloud scan
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
